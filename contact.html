    <section class="section page-section page-section-top animate">

        <div class="contact-wrap">
            <div class="contact-info">
                <div class="contact-card">
                    <h3>Email</h3>
                    <p>sachinrathorsachin17@gmail.com</p>
                </div>
                <div class="contact-card">

                <div class="contact-card">

                </div>
            </div>
            <form id="contact-form" class="contact-form" action="https://formsubmit.co/ajax/sachinrathorsachin17@gmail.com" method="post">
                <input type="hidden" name="_subject" value="New Portfolio Contact Message">
                <input type="hidden" name="_captcha" value="false">
                <input type="text" name="_honey" tabindex="-1" autocomplete="off" class="contact-honeypot" aria-hidden="true">
                <input type="text" name="name" placeholder="Your Name" required>
                <input type="email" name="email" placeholder="Your Email" required>
                <input type="text" name="subject" placeholder="Subject">
                <textarea name="message" placeholder="Write your message" required></textarea>
                <div class="contact-form-actions">
                    <button type="submit">Send Message</button>
                    <a class="whatsapp-backup-btn" href="https://wa.me/919009712338?text=Hi%20Sachin%2C%20I%20am%20contacting%20you%20from%20your%20portfolio." target="_blank" rel="noopener noreferrer">
                        <i class="fab fa-whatsapp"></i> WhatsApp

                </div>
                <p id="contact-form-status" class="contact-form-status" aria-live="polite"></p>
            </form>
